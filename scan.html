<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:30px}
h2{color:#ff4900;margin-bottom:25px}
#qrcode{display:inline-block;background:#fff;padding:12px;border-radius:10px}
#qrcode img{display:block}
#status{margin-top:20px;font-size:18px;font-weight:bold}
.ok{color:#00ff88}
.err{color:#ff4444}
.wait{color:#ffaa00}
.info{color:#aaa;font-size:13px;margin-top:10px}
.btn{margin-top:20px;padding:10px 20px;background:#ff4900;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<h2>快手扫码登录</h2>
<div id="qrcode"></div>
<p id="status" class="wait">等待扫码...</p>
<p class="info">打开快手APP扫一扫</p>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
let scanId = null;

async function start() {
    const res = await fetch("/api/qr");
    const data = await res.json();
    scanId = data.scanId;

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: data.scanUrl,
        width: 300,
        height: 300
    });

    poll();
}

async function poll() {
    while (true) {
        const res = await fetch("/api/check?id=" + scanId);
        const data = await res.json();

        if (data.status === "done") {
            document.getElementById("status").className = "ok";
            document.getElementById("status").textContent = "✅ 扫码成功！Cookie已获取";
            break;
        }

        await new Promise(r => setTimeout(r, 3000));
    }
}

start();
</script>
</body>
</html>
