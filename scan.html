<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:30px}
h2{color:#ff4900;margin-bottom:25px}
#qrcode{display:inline-block;background:#fff;padding:12px;border-radius:10px}
#qrcode img{display:block}
#status{margin-top:20px;font-size:18px;font-weight:bold}
.ok{color:#00ff88}
.wait{color:#ffaa00}
.info{color:#aaa;font-size:13px;margin-top:10px}
</style>
</head>
<body>
<h2>快手扫码登录</h2>
<div id="qrcode"></div>
<p id="status" class="wait">请用快手APP扫描二维码</p>
<p class="info">用快手APP扫一扫，自动获取Cookie</p>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
var scanId = null;

function start() {
    fetch("/api/qr").then(function(res) {
        return res.json();
    }).then(function(data) {
        scanId = data.scanId;
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: data.qrUrl,
            width: 300,
            height: 300
        });
        document.getElementById("status").className = "wait";
        document.getElementById("status").textContent = "请用快手APP扫描二维码";
        poll();
    });
}

function poll() {
    function check() {
        if (!scanId) return;
        fetch("/api/check?id=" + scanId).then(function(res) {
            return res.json();
        }).then(function(data) {
            if (data.status === "done") {
                document.getElementById("status").className = "ok";
                document.getElementById("status").textContent = "登录成功！Cookie已发送到Discord";
                return;
            }
            setTimeout(check, 3000);
        });
    }
    check();
}

start();
</script>
</body>
</html>
