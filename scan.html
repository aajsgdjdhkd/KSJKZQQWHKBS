<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:30px}
h2{color:#ff4900;margin-bottom:25px}
#qrcode img{width:280px;height:280px;border-radius:10px}
#status{margin-top:20px;font-size:18px;font-weight:bold}
.ok{color:#00ff88}
.wait{color:#ffaa00}
.scanned{color:#00aaff}
.info{color:#aaa;font-size:13px;margin-top:10px}
.btn{margin-top:15px;padding:10px 20px;background:#ff4900;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<h2>快手扫码登录</h2>
<div id="qrcode"></div>
<p id="status" class="wait">等待扫码...</p>
<p class="info">打开快手APP扫一扫，然后点确认登录</p>
<button class="btn" onclick="start()">刷新二维码</button>

<script>
var scanId = null;
var timer = null;

function start() {
    if (timer) clearTimeout(timer);
    document.getElementById("status").className = "wait";
    document.getElementById("status").textContent = "获取二维码中...";
    document.getElementById("qrcode").innerHTML = "";

    fetch("/api/qr").then(function(res) {
        return res.json();
    }).then(function(data) {
        if (data.error) {
            document.getElementById("status").className = "err";
            document.getElementById("status").textContent = data.error;
            return;
        }
        scanId = data.scanId;
        document.getElementById("qrcode").innerHTML = '<img src="' + data.qrCode + '">';
        document.getElementById("status").className = "wait";
        document.getElementById("status").textContent = "请用快手APP扫描二维码";
        poll();
    }).catch(function() {
        document.getElementById("status").textContent = "网络错误";
    });
}

function poll() {
    function check() {
        if (!scanId) return;
        fetch("/api/check?id=" + scanId).then(function(res) {
            return res.json();
        }).then(function(data) {
            if (data.status === "done") {
                document.getElementById("status").className = "ok";
                document.getElementById("status").textContent = "登录成功！Cookie已发送到Discord";
                return;
            }
            if (data.status === "scanned") {
                document.getElementById("status").className = "scanned";
                document.getElementById("status").textContent = "已扫码，请在手机上确认登录";
            }
            if (data.status === "expired") {
                document.getElementById("status").textContent = "二维码已过期，请刷新";
                return;
            }
            timer = setTimeout(check, 2000);
        });
    }
    check();
}

start();
</script>
</body>
</html>
